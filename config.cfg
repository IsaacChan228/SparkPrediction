[training]
# Training hyperparameters
epochs = 10
batch_size = 64
lr = 0.001
weight_decay = 1e-5
early_stopping_patience = 5

[paths]
# Paths for data and model
train_csv = training_data/train_merged.csv
input_csv = prediction_input/test_merged.csv
model_path = Model/pytorch_mlp.pt
report_path = prediction_output/training_report.txt

[prediction]
# Prediction run settings
output_csv = prediction_output/prediction_result.csv
app_name = spark-pytorch-predict

[features]
# When true, use BERT-encoded `comment` embeddings instead of `comment_len`
use_bert = true
# Model name for sentence-transformers (used when use_bert = true)
bert_model = all-MiniLM-L6-v2
