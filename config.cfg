[training]
# Training hyperparameters
epochs = 20
batch_size = 256
lr = 1e-3
weight_decay = 1e-6
early_stopping_patience = 5

[paths]
# Paths for data and model
train_csv = training_data/train_merged.csv
input_csv = prediction_input/test_merged.csv
model_path = Model/pytorch_mlp.pt
report_path = prediction_output/training_report.txt

[prediction]
# Prediction run settings
output_csv = prediction_output/prediction_result.csv
app_name = spark-pytorch-predict
